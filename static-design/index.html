<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Live Memory Collection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Host+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --frame-w: 1027px;
      --frame-h: 1119px;
      --peach-0: #ffffff;
      --peach-1: #f1d4bd;
      --peach-2: #e9be9b;
      --peach-3: #e2a87a;
      --peach-4: #d7bAa2;
      --peach-5: #ccCBC9;
      --card-radius: 23px;
      --card-shadow: 0 5px 15px 3px rgba(0, 0, 0, 0.1);
      --photo-overlay: linear-gradient(
        -60deg,
        rgba(102, 102, 102, 0) 25%,
        rgba(180, 104, 43, 0.76) 75%
      );
      --peach-frame: radial-gradient(
        ellipse at 50% 0%,
        #ffffff 0%,
        #f1d4bd 50%,
        #e9be9b 75%,
        #e2a87a 100%
      );
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      font-family: "Host Grotesk", system-ui, sans-serif;
      background: #efece9;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .frame {
      position: relative;
      width: var(--frame-w);
      height: var(--frame-h);
      max-width: 100vw;
      border-radius: 5px;
      overflow: hidden;
      background:
        linear-gradient(90deg, rgba(0,0,0,0.04), rgba(0,0,0,0.04)),
        radial-gradient(
          ellipse 1100px 1300px at 18% 12%,
          #e2a87a 0%,
          #d7baa2 45%,
          #cccbc9 95%
        );
    }

    .frame::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: url("assets/bg-pattern.svg");
      background-size: 100% 100%;
      background-repeat: no-repeat;
      pointer-events: none;
      opacity: 0.85;
    }

    /* Headers */
    .header-top {
      position: absolute;
      top: 29px;
      left: 0;
      right: 0;
      text-align: center;
      font-weight: 500;
      font-size: 20px;
      color: #f3f3f3;
      letter-spacing: 0.01em;
    }

    .header-bottom {
      position: absolute;
      top: 900px;
      left: 0;
      right: 0;
      text-align: center;
      font-weight: 400;
      font-size: 64px;
      line-height: 1.05;
      color: #e5e5e5;
      letter-spacing: 0.01em;
    }

    /* Card */
    .card {
      position: absolute;
      border-radius: var(--card-radius);
      box-shadow: var(--card-shadow);
      border: 1px solid #ffffff;
      background: var(--peach-frame);
      padding: 0;
      overflow: hidden;
    }

    .card .photo {
      position: absolute;
      inset: 2px;
      border-radius: 22px;
      overflow: hidden;
    }

    .card .photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: blur(5.75px);
      transform: scale(1.06);
      display: block;
    }

    .card .photo.photo-fallback {
      background:
        radial-gradient(ellipse at 30% 25%, #f3d6bd 0%, transparent 60%),
        radial-gradient(ellipse at 70% 75%, #b4682b 0%, transparent 65%),
        linear-gradient(160deg, #6b3a1f 0%, #c47a48 55%, #f1c69d 100%);
      filter: blur(5.75px);
    }

    .card .photo::after {
      content: "";
      position: absolute;
      inset: 0;
      background: var(--photo-overlay);
      border-radius: 22px;
      pointer-events: none;
    }

    .card .content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #ffffff;
    }

    .card .name {
      margin-top: 18px;
      font-weight: 300;
      font-size: 16px;
      line-height: 1.1;
      text-align: center;
    }

    .card .date {
      margin-top: 4px;
      font-weight: 400;
      font-size: 8px;
      line-height: 1.1;
      text-align: center;
    }

    .card .move {
      position: absolute;
      top: 14px;
      right: 14px;
    }

    .card .nav {
      position: absolute;
      left: 16px;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .card .actions {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 30px;
      display: flex;
      justify-content: center;
      gap: 40px;
    }

    .card.has-label .actions {
      bottom: 38px;
    }

    .card .label {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 8px;
      text-align: center;
      color: #ffffff;
      font-size: 8px;
      font-weight: 400;
    }

    /* Card placements */
    .card-jamie    { left: 280px; top: 123px; width: 200px; height: 209px; }
    .card-anthony  { left: 547px; top:  93px; width: 180px; height: 180px; }
    .card-eliza    { left: 152px; top: 386px; width: 198px; height: 207px; }
    .card-hazel    { left: 389px; top: 476px; width: 250px; height: 350px; }
    .card-layla    { left: 681px; top: 306px; width: 200px; height: 270px; }

    /* Hazel needs more breathing room */
    .card-hazel .nav { top: 47%; }
    .card-hazel .actions { bottom: 24px; }

    /* SVG icons */
    .icon {
      width: 23px;
      height: 23px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
    }

    .icon svg { width: 100%; height: 100%; }

    /* Background subtle radial cross */
    .frame::after {
      content: "";
      position: absolute;
      width: 1100px;
      height: 1100px;
      left: 50%;
      top: 60%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.18);
      pointer-events: none;
    }

    .crosshair {
      position: absolute;
      pointer-events: none;
      background: rgba(255, 255, 255, 0.18);
    }
    .crosshair.h { left: 0; right: 0; height: 1px; }
    .crosshair.v { top: 0; bottom: 0; width: 1px; }
  </style>
</head>
